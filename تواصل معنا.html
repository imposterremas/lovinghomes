<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تواصل معنا والحجز - فندق الأليفة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo"><img src="لوغو.jpg" alt="لوفينغ هومز"></div>
        <nav>
            <ul>
                <li><a href="الرئيسية.html">الرئيسية</a></li>
                <li><a href="المرافق.html">المرافق</a></li>
                <li><a href="الحزم و الاسعار.html">الحزم</a></li>
                <li><a href="الانشطة و الترفيه.html">الأنشطة</a></li>
                <li><a href="المعرض.html">المعرض</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2 style="color: var(--deep-purple); font-size: 2rem;">نموذج الحجز السريع </h2>
        
        <div class="card" style="max-width: 22rem; margin: 2rem auto; padding: 2rem; background: white; border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <form id="bookingForm">
                <input type="text" id="ownerName" placeholder="اسم صاحب الكلب الكامل" required style="width: 100%; margin-bottom: 1rem; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; color: #000;">
                
                <input type="tel" id="phone" placeholder="رقم الهاتف (07XXXXXXXX)" required style="width: 100%; margin-bottom: 0.5rem; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; color: #000;">
                
                <div style="text-align: right; margin-top: 1rem; font-weight: bold; color: var(--deep-purple);">تاريخ الوصول المتوقع:</div>
                <input type="date" id="arrivalDate" required style="width: 100%; margin-bottom: 1rem; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; color: #000;">
                
                <textarea id="notes" rows="4" placeholder="هل هناك متطلبات خاصة (أدوية، نوع طعام)؟" style="width: 100%; margin-bottom: 1.5rem; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; color: #000;"></textarea>
                
                <button type="submit" class="btn-book" style="width: 100%; background: var(--cool-purple); color: white; padding: 1rem; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                    تأكيد إرسال طلب الحجز
                </button>
            </form>
        </div>

        <div class="section-about">
            <h2 style="text-align: center;">من نحن؟</h2>
            <p>نحن فريق متخصص يسعى لتوفير تجربة فندقية فارهة للكلاب. نوفر الرعاية الطبية، التغذية السليمة، والأنشطة الترفيهية.</p>
        </div>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" onclick="adjustZoom(1)" title="تكبير">+</button>
        <button class="zoom-btn" onclick="adjustZoom(-1)" title="تصغير">-</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
